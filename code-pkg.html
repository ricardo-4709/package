<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅程打包清單</title>
    <style>
        /* 低飽和度、乾淨的日系/北歐風配色 */
        :root {
            --bg-color: #f7f8f6;       /* 柔和米白 */
            --card-bg: #ffffff;        /* 純白卡片 */
            --text-main: #3a3f47;      /* 深灰 */
            --text-muted: #8e949f;     /* 淺灰 */
            --accent: #9aa899;         /* 莫蘭迪鼠尾草綠 */
            --accent-light: #e8ebe7;   /* 極淺綠 */
            --border-color: #e4e7e4;   /* 邊框線 */
            --danger: #cca4a4;         /* 低飽和粉紅（刪除用） */
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 應用程式主視口：限定寬度，在手機或桌面皆完美呈現 */
        .app-viewport {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.02);
        }

        /* 頁面滑動容器 */
        .pages-container {
            flex: 1;
            display: flex;
            width: 200%; /* 兩頁寬度 */
            height: calc(100vh - 60px); /* 扣除底部導覽列 */
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 單個獨立頁面 */
        .page {
            width: 50%;
            height: 100%;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        .stats {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--accent-light);
            color: #5c665b;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* --------------------------
           分組清單樣式
        -------------------------- */
        .group-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 放置位置區塊 (大群組) */
        .location-section {
            background: transparent;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .location-header {
            font-size: 0.95rem;
            font-weight: 600;
            color: #5c665b;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 2px;
            border-bottom: 1px solid var(--border-color);
            margin-top: 4px;
        }

        /* 物品分類區塊 (小群組) */
        .category-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-left: 4px;
        }

        .category-header {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 2px;
        }

        /* 行李項目樣式 */
        .item-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-node {
            background: var(--card-bg);
            padding: 12px 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-subtle);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        /* 自訂複選框 */
        .checkbox-wrapper {
            position: relative;
            width: 22px;
            height: 22px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            width: 22px;
            height: 22px;
            background-color: transparent;
            border: 2px solid var(--accent);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .checkbox-wrapper input:checked ~ .checkmark {
            background-color: var(--accent);
        }

        .checkbox-wrapper input:checked ~ .checkmark:after {
            content: "";
            position: absolute;
            left: 7px;
            top: 3px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* 輸入與編輯框 */
        .item-text {
            font-size: 0.95rem;
            border: none;
            background: transparent;
            color: var(--text-main);
            width: 100%;
            outline: none;
            padding: 2px 0;
        }

        /* 已完成樣式 */
        .item-node.completed {
            opacity: 0.55;
            background-color: #fafafa;
        }
        
        .item-node.completed .item-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* 刪除按鈕 */
        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 4px 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .delete-btn:active {
            color: var(--danger);
        }

        /* --------------------------
           新增行李頁面樣式
        -------------------------- */
        .form-title {
            margin-bottom: 24px;
        }

        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-subtle);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            font-size: 0.95rem;
            outline: none;
            color: var(--text-main);
            transition: border-color 0.2s;
            appearance: none; /* 去除原生箭頭以便客製 */
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: "▾";
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--accent);
            background-color: #fff;
        }

        /* 即時自訂輸入欄位（隱藏/顯示動畫） */
        .custom-input-container {
            display: none;
            margin-top: 8px;
            animation: slideDown 0.2s ease-out forwards;
        }

        .custom-input-container.show {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-submit {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .btn-submit:active {
            opacity: 0.9;
        }

        /* 提示空白狀態 */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin: auto 0;
            padding: 40px 0;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .empty-icon {
            font-size: 2.5rem;
            opacity: 0.5;
        }

        /* --------------------------
           底部固定導覽列 (小小字樣式)
        -------------------------- */
        .bottom-nav {
            height: 60px;
            background: rgba(247, 248, 246, 0.95);
            backdrop-filter: blur(8px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* 支援 iPhone 底部安全區 */
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .nav-item {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem; /* 小小字風格 */
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .nav-item .icon {
            font-size: 1.1rem;
            margin-bottom: 2px;
            transition: transform 0.2s;
        }

        /* 啟用狀態 */
        .nav-item.active {
            color: var(--accent);
            font-weight: 600;
        }

        .nav-item.active .icon {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="app-viewport">
        <!-- 頁面滑動區 -->
        <div class="pages-container" id="pages-container">
            
            <!-- 第一頁：打包清單 -->
            <div class="page" id="page-list">
                <header>
                    <h1>打包清單</h1>
                    <div class="stats" id="stats-text">0 / 0 已打包</div>
                </header>

                <div id="empty-state" class="empty-state" style="display: none;">
                    <div class="empty-icon">🎒</div>
                    <div>清單空空的，滑到右邊新增行李吧！</div>
                </div>

                <!-- 分類顯示群組 -->
                <div class="group-container" id="grouped-items"></div>
            </div>

            <!-- 第二頁：新增行李 -->
            <div class="page" id="page-add">
                <header class="form-title">
                    <h1>新增行李</h1>
                </header>

                <div class="form-card">
                    <!-- 物品名稱 -->
                    <div class="form-group">
                        <label class="form-label">物品名稱</label>
                        <input type="text" id="item-input" class="form-input" placeholder="例如：護照、充電線..." autocomplete="off">
                    </div>

                    <!-- 放置位置 -->
                    <div class="form-group">
                        <label class="form-label">放置位置</label>
                        <div class="select-wrapper">
                            <select id="location-select" class="form-select" onchange="handleSelectChange(this, 'location-custom')"></select>
                        </div>
                        <!-- 自訂放置位置輸入框 -->
                        <div id="location-custom" class="custom-input-container">
                            <input type="text" id="location-custom-input" class="form-input" placeholder="輸入新的放置位置...">
                        </div>
                    </div>

                    <!-- 物品分類 -->
                    <div class="form-group">
                        <label class="form-label">物品分類</label>
                        <div class="select-wrapper">
                            <select id="category-select" class="form-select" onchange="handleSelectChange(this, 'category-custom')"></select>
                        </div>
                        <!-- 自訂分類輸入框 -->
                        <div id="category-custom" class="custom-input-container">
                            <input type="text" id="category-custom-input" class="form-input" placeholder="輸入新的分類名稱...">
                        </div>
                    </div>

                    <button id="add-btn" class="btn-submit">
                        <span>加入行李清單</span>
                    </button>
                </div>
            </div>

        </div>

        <!-- 底部微型導覽列 -->
        <div class="bottom-nav">
            <button class="nav-item active" onclick="switchPage(0)">
                <span class="icon">📋</span>
                <span>【清單】</span>
            </button>
            <button class="nav-item" onclick="switchPage(1)">
                <span class="icon">✍️</span>
                <span>【新增】</span>
            </button>
        </div>
    </div>

    <script>
        // --------------------------
        // 狀態初始化與 LocalStorage
        // --------------------------
        const defaultState = {
            items: [
                { id: 1, text: '護照與簽證', completed: false, location: '隨身包包', category: '貴重證件' },
                { id: 2, text: '換洗衣物', completed: false, location: '大行李箱', category: '衣物鞋包' },
                { id: 3, text: '行動電源與快充線', completed: true, location: '後背包', category: '電子配件' },
                { id: 4, text: '牙刷盥洗組', completed: false, location: '大行李箱', category: '盥洗用品' }
            ],
            locations: ['大行李箱', '後背包', '隨身包包'],
            categories: ['貴重證件', '衣物鞋包', '電子配件', '盥洗用品', '其他備用']
        };

        // 嘗試自 LocalStorage 讀取，沒有的話載入預設
        let appState = defaultState;
        try {
            const savedState = localStorage.getItem('packing_app_state');
            if (savedState) {
                appState = JSON.parse(savedState);
            }
        } catch (e) {
            console.warn("LocalStorage 存取失敗 (可能在嵌入 iframe 中執行)：", e);
        }

        // 綁定 DOM 元素
        const pagesContainer = document.getElementById('pages-container');
        const groupedItemsContainer = document.getElementById('grouped-items');
        const itemInput = document.getElementById('item-input');
        const addBtn = document.getElementById('add-btn');
        const statsText = document.getElementById('stats-text');
        const emptyState = document.getElementById('empty-state');
        const locationSelect = document.getElementById('location-select');
        const categorySelect = document.getElementById('category-select');
        const navItems = document.querySelectorAll('.nav-item');

        let currentPageIndex = 0;

        // --------------------------
        // 儲存與同步
        // --------------------------
        function saveState() {
            try {
                localStorage.setItem('packing_app_state', JSON.stringify(appState));
            } catch (e) {
                console.warn("無法將資料儲存至 LocalStorage：", e);
            }
        }

        // --------------------------
        // 分頁與滑動切換邏輯
        // --------------------------
        function switchPage(index) {
            currentPageIndex = index;
            pagesContainer.style.transform = `translateX(-${index * 50}%)`;
            
            navItems.forEach((item, idx) => {
                if (idx === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // 手勢左右滑動切換
        let touchStartX = 0;
        let touchEndX = 0;

        document.getElementById('pages-container').addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.getElementById('pages-container').addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistance = touchStartX - touchEndX;
            const swipeThreshold = 60; // 觸發滑動的最小距離

            if (swipeDistance > swipeThreshold && currentPageIndex === 0) {
                // 向左滑，切換到「新增」
                switchPage(1);
            } else if (swipeDistance < -swipeThreshold && currentPageIndex === 1) {
                // 向右滑，切換到「清單」
                switchPage(0);
            }
        }

        // --------------------------
        // 下拉選單動態更新與客製輸入處理
        // --------------------------
        function populateSelects() {
            // 位置下拉
            locationSelect.innerHTML = '';
            appState.locations.forEach(loc => {
                const opt = document.createElement('option');
                opt.value = loc;
                opt.innerText = loc;
                locationSelect.appendChild(opt);
            });
            const customLocOpt = document.createElement('option');
            customLocOpt.value = '__new__';
            customLocOpt.innerText = '＋ 新增放置位置...';
            locationSelect.appendChild(customLocOpt);

            // 分類下拉
            categorySelect.innerHTML = '';
            appState.categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                categorySelect.appendChild(opt);
            });
            const customCatOpt = document.createElement('option');
            customCatOpt.value = '__new__';
            customCatOpt.innerText = '＋ 新增物品分類...';
            categorySelect.appendChild(customCatOpt);
        }

        // 偵測是否點選了「＋ 新增...」
        function handleSelectChange(selectElement, targetInputId) {
            const customContainer = document.getElementById(targetInputId);
            if (selectElement.value === '__new__') {
                customContainer.classList.add('show');
                customContainer.querySelector('input').focus();
            } else {
                customContainer.classList.remove('show');
            }
        }

        // --------------------------
        // 渲染主清單 (依 放置位置 > 分類 排序)
        // --------------------------
        function renderGroupedList() {
            groupedItemsContainer.innerHTML = '';

            if (appState.items.length === 0) {
                emptyState.style.display = 'flex';
                updateStats();
                return;
            }
            emptyState.style.display = 'none';

            // 1. 建立巢狀分組對象 { Location: { Category: [Items] } }
            const grouped = {};
            
            appState.items.forEach(item => {
                const loc = item.location || '未分類位置';
                const cat = item.category || '未分類項目';

                if (!grouped[loc]) {
                    grouped[loc] = {};
                }
                if (!grouped[loc][cat]) {
                    grouped[loc][cat] = [];
                }
                grouped[loc][cat].push(item);
            });

            // 2. 依照我們在 locations 與 categories 列表定義的順序進行渲染
            // 找出當前存在的 locations，並按照 appState.locations 的順序排序
            const sortedLocations = appState.locations.filter(loc => grouped[loc]);
            // 補上如果有不在清單中的自訂位置
            Object.keys(grouped).forEach(loc => {
                if (!sortedLocations.includes(loc)) sortedLocations.push(loc);
            });

            sortedLocations.forEach(loc => {
                // 建立位置群組區塊 (外層)
                const locSection = document.createElement('div');
                locSection.className = 'location-section';

                const locHeader = document.createElement('div');
                locHeader.className = 'location-header';
                locHeader.innerHTML = `📍 <span>${escapeHtml(loc)}</span>`;
                locSection.appendChild(locHeader);

                // 排序該位置下的分類
                const sortedCategories = appState.categories.filter(cat => grouped[loc][cat]);
                Object.keys(grouped[loc]).forEach(cat => {
                    if (!sortedCategories.includes(cat)) sortedCategories.push(cat);
                });

                sortedCategories.forEach(cat => {
                    // 建立分類區塊 (內層)
                    const catSection = document.createElement('div');
                    catSection.className = 'category-section';

                    const catHeader = document.createElement('div');
                    catHeader.className = 'category-header';
                    catHeader.innerHTML = `📁 <span>${escapeHtml(cat)}</span>`;
                    catSection.appendChild(catHeader);

                    // 建立該分類下的項目清單
                    const itemList = document.createElement('ul');
                    itemList.className = 'item-list';

                    grouped[loc][cat].forEach(item => {
                        const li = document.createElement('li');
                        li.className = `item-node ${item.completed ? 'completed' : ''}`;

                        li.innerHTML = `
                            <div class="item-left">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleComplete(${item.id})">
                                    <span class="checkmark"></span>
                                </label>
                                <input type="text" class="item-text" value="${escapeHtml(item.text)}" onchange="editItem(${item.id}, this.value)">
                            </div>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">✕</button>
                        `;
                        itemList.appendChild(li);
                    });

                    catSection.appendChild(itemList);
                    locSection.appendChild(catSection);
                });

                groupedItemsContainer.appendChild(locSection);
            });

            updateStats();
        }

        // --------------------------
        // 功能操作
        // --------------------------

        // HTML 安全逸出防護
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 更新統計
        function updateStats() {
            const total = appState.items.length;
            const completedCount = appState.items.filter(item => item.completed).length;
            statsText.innerText = `${completedCount} / ${total} 已打包`;
        }

        // 切換完成勾選
        function toggleComplete(id) {
            appState.items = appState.items.map(item => {
                if (item.id === id) {
                    return { ...item, completed: !item.completed };
                }
                return item;
            });
            saveState();
            renderGroupedList();
        }

        // 編輯項目文字
        function editItem(id, newText) {
            appState.items = appState.items.map(item => {
                if (item.id === id) {
                    return { ...item, text: newText.trim() };
                }
                return item;
            });
            saveState();
            renderGroupedList();
        }

        // 刪除行李
        function deleteItem(id) {
            appState.items = appState.items.filter(item => item.id !== id);
            saveState();
            renderGroupedList();
        }

        // 新增行李
        function addItem() {
            const text = itemInput.value.trim();
            if (text === '') return;

            let finalLocation = locationSelect.value;
            let finalCategory = categorySelect.value;

            // 處理自訂放置位置
            if (finalLocation === '__new__') {
                const customLocInput = document.getElementById('location-custom-input');
                const customLocValue = customLocInput.value.trim();
                if (customLocValue !== '') {
                    finalLocation = customLocValue;
                    if (!appState.locations.includes(finalLocation)) {
                        appState.locations.push(finalLocation);
                    }
                } else {
                    finalLocation = '未分類位置';
                }
            }

            // 處理自訂物品分類
            if (finalCategory === '__new__') {
                const customCatInput = document.getElementById('category-custom-input');
                const customCatValue = customCatInput.value.trim();
                if (customCatValue !== '') {
                    finalCategory = customCatValue;
                    if (!appState.categories.includes(finalCategory)) {
                        appState.categories.push(finalCategory);
                    }
                } else {
                    finalCategory = '其他備用';
                }
            }

            // 建立行李對象
            const newItem = {
                id: Date.now(),
                text: text,
                completed: false,
                location: finalLocation,
                category: finalCategory
            };

            appState.items.push(newItem);
            
            // 清理與還原輸入欄位
            itemInput.value = '';
            document.getElementById('location-custom-input').value = '';
            document.getElementById('category-custom-input').value = '';
            document.getElementById('location-custom').classList.remove('show');
            document.getElementById('category-custom').classList.remove('show');

            saveState();
            populateSelects();
            renderGroupedList();

            // 滑動回第一頁觀看更新
            switchPage(0);
        }

        // --------------------------
        // 事件監聽與初始執行
        // --------------------------
        addBtn.addEventListener('click', addItem);
        itemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addItem();
            }
        });

        // 頁面初次載入
        populateSelects();
        renderGroupedList();
    </script>
</body>
</html>
