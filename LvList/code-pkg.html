<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅程打包清單</title>
    
    <meta name="theme-color" content="#9aa899">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="打包清單">

    <style>
        /* 低飽和度、乾淨的日系/北歐風配色 */
        :root {
            --bg-color: #f7f8f6;       /* 柔和米白 */
            --card-bg: #ffffff;        /* 純白卡片 */
            --text-main: #3a3f47;      /* 深灰 */
            --text-muted: #8e949f;     /* 淺灰 */
            --accent: #9aa899;         /* 莫蘭迪鼠尾草綠 */
            --accent-light: #e8ebe7;   /* 極淺綠 */
            --border-color: #e4e7e4;   /* 邊框線 */
            --danger: #cca4a4;         /* 低飽和粉紅（刪除用） */
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.03);
            /* 動態自訂字型變數，預設為系統字型 */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --------------------------
           字體與通用重設 (精簡繼承規則)
        -------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* 大部分元素會自動繼承 body 的字型，僅針對不自動繼承的表單控制元件額外宣告 */
        body, button, input, select, textarea {
            font-family: var(--font-family);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 應用程式主視口 */
        .app-viewport {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.02);
        }

        /* 滑動頁面的包裝區 */
        .pages-wrapper {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        /* 頁面滑動容器 */
        .pages-container {
            display: flex;
            width: 300%; /* 三頁寬度 */
            height: 100%;
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 單個獨立頁面 */
        .page {
            width: 33.333%;
            height: 100%;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        /* 精簡重複定義的 color 屬性 */
        .stats {
            font-size: 0.85rem;
            background: var(--accent-light);
            color: #5c665b;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            align-self: flex-start;
        }

        /* 設定觸發按鈕 */
        .settings-trigger-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.25s, transform 0.25s;
        }

        .settings-trigger-btn:active {
            background-color: var(--accent-light);
            transform: rotate(30deg);
        }

        .settings-svg {
            color: #5c665b;
            transition: color 0.2s;
        }

        /* --------------------------
           打包清單位置群組 (無外框極簡左側標示線)
        -------------------------- */
        .grouped-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        .location-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .group-header {
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            font-weight: 600;
            color: #5c665b;
            padding: 2px 0 2px 8px;
            border-left: 3px solid var(--accent); /* 極簡左側莫蘭迪綠點綴線 */
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            margin-bottom: 2px;
        }

        /* 行李項目樣式 */
        .item-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-node {
            background: var(--card-bg);
            padding: 12px 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-subtle);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        /* 標籤排版 */
        .item-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 6px 12px;
            flex: 1;
            width: 100%;
            min-width: 0;
        }

        .item-text-row {
            flex: 1;
            min-width: 120px;
            display: flex;
            align-items: center;
        }

        /* 自訂複選框 */
        .checkbox-wrapper {
            position: relative;
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background-color: transparent;
            border: 2px solid var(--accent);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .checkbox-wrapper input:checked ~ .checkmark {
            background-color: var(--accent);
        }

        .checkbox-wrapper input:checked ~ .checkmark:after {
            content: "";
            position: absolute;
            left: 6px;
            top: 2px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* 輸入與編輯框 */
        .item-text {
            font-size: 0.95rem;
            border: none;
            background: transparent;
            color: var(--text-main);
            width: 100%;
            outline: none;
            padding: 0;
            font-weight: 500;
        }

        /* 標籤群組 */
        .item-tags {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            margin-left: auto;
            flex-shrink: 0;
        }

        /* 標籤設計 */
        .tag {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            letter-spacing: 0.02em;
            box-shadow: 0 1px 2px rgba(0,0,0,0.01);
            transition: all 0.2s ease;
        }

        /* 已完成樣式 */
        .item-node.completed {
            opacity: 0.55;
            background-color: #fafafa;
        }
        
        .item-node.completed .item-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* 刪除按鈕 */
        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 4px 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: color 0.2s ease;
            margin-left: 8px;
            flex-shrink: 0;
        }
        
        .delete-btn:active {
            color: var(--danger);
        }

        /* --------------------------
           新增行李頁面與選項管理
        -------------------------- */
        .form-title {
            margin-bottom: 24px;
        }

        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-subtle);
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 管理按鈕 */
        .manage-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 0.8rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .manage-btn:active {
            background-color: var(--accent-light);
        }

        /* 展開的管理區塊 */
        .manager-container {
            max-height: 0;
            overflow: hidden; 
            background: #fafbfa;
            border: 1px dashed transparent;
            border-radius: 10px;
            padding: 0 12px;
            margin-top: 0;
            opacity: 0;
            transition: max-height 0.3s cubic-bezier(0.25, 1, 0.5, 1),
                        padding 0.3s cubic-bezier(0.25, 1, 0.5, 1),
                        margin-top 0.3s cubic-bezier(0.25, 1, 0.5, 1),
                        opacity 0.2s ease,
                        border-color 0.3s ease;
        }

        .manager-container.show {
            max-height: 200px; 
            padding: 8px 12px;
            margin-top: 4px;
            opacity: 1;
            border-color: var(--border-color);
        }

        /* 管理清單內部滾動區 */
        .manager-list {
            max-height: 110px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .manager-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid #f0f2f0;
        }

        .manager-item:last-child {
            border-bottom: none;
        }

        .manager-del-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            padding: 2px 6px;
            transition: opacity 0.2s;
        }

        .manager-del-btn:active {
            opacity: 0.6;
        }

        /* 管理區塊頂部「直接新增」輸入列 */
        .manager-add-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--border-color);
        }

        .manager-add-input {
            flex: 1;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            outline: none;
            background: var(--card-bg);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .manager-add-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(154, 168, 153, 0.15);
        }

        .manager-add-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .manager-add-btn:active {
            opacity: 0.85;
        }

        /* --------------------------
           自訂無額外視窗的內嵌手動折疊式選擇器 (Accordion)
        -------------------------- */
        .custom-inline-select {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .custom-inline-select.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(154, 168, 153, 0.15);
        }

        .inline-select-trigger {
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
            background: var(--card-bg);
            user-select: none;
        }

        .inline-select-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            background: #fafbfa;
            border-top: 0px solid var(--border-color);
        }

        .inline-select-menu.show {
            max-height: 250px;
            border-top: 1px dashed var(--border-color);
        }

        .inline-options-list {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .inline-option-item {
            padding: 10px 12px;
            font-size: 0.9rem;
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .inline-option-item:active {
            background-color: var(--accent-light);
        }

        .inline-option-item.selected {
            background-color: var(--accent);
            color: #ffffff;
            font-weight: 600;
        }

        .inline-option-item-new {
            color: var(--accent);
            font-weight: 600;
            border-top: 1px dashed var(--border-color);
            margin-top: 6px;
            padding-top: 12px;
            border-radius: 0;
        }

        .chevron-svg {
            color: var(--text-muted);
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .custom-inline-select.open .chevron-svg {
            transform: rotate(180deg);
            color: var(--accent);
        }

        /* 下拉選單與輸入框美化設計 */
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            font-size: 0.95rem;
            outline: none;
            color: var(--text-main);
            transition: all 0.25s ease;
        }

        .form-input:focus {
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(154, 168, 153, 0.20);
        }

        /* 自訂下拉選擇器 (form-select) 樣式 */
        .select-wrapper {
            position: relative;
            width: 100%;
        }

        .form-select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            font-size: 0.95rem;
            outline: none;
            color: var(--text-main);
            transition: all 0.25s ease;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%238e949f' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
            cursor: pointer;
        }

        .form-select:focus {
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(154, 168, 153, 0.20);
        }

        /* 自訂提交按鈕 (btn-submit) 樣式 */
        .btn-submit {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            text-align: center;
        }

        .btn-submit:active {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* 自訂新增動畫 */
        .custom-input-container {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-8px);
            transition: max-height 0.25s cubic-bezier(0.25, 1, 0.5, 1),
                        opacity 0.25s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 0.25s cubic-bezier(0.25, 1, 0.5, 1),
                        margin-top 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            margin-top: 0;
        }

        .custom-input-container.show {
            max-height: 80px; 
            opacity: 1;
            transform: translateY(0);
            margin-top: 8px;
        }

        /* --------------------------
           歷史封存頁面樣式
        -------------------------- */
        .archive-list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 20px;
        }

        .archive-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow-subtle);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .archive-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .archive-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
            flex: 1;
        }

        .archive-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            word-break: break-all;
        }

        .archive-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .archive-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .archive-action-btn {
            background: none;
            border: none;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .archive-btn-restore {
            color: var(--accent);
            background: var(--accent-light);
        }

        .archive-btn-restore:active {
            background: var(--accent);
            color: white;
        }

        .archive-btn-delete {
            color: #b08585;
            background: #f7eded;
        }

        .archive-btn-delete:active {
            background: #cca4a4;
            color: white;
        }

        .archive-details-toggle {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0;
            align-self: flex-start;
            font-weight: 500;
        }

        /* 條列式行李呈現 */
        .archive-items-list {
            display: none;
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
            margin-top: 4px;
            list-style: none;
        }

        .archive-items-list.show {
            display: block;
            animation: slideDown 0.25s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* 展開動畫效果 (slideDown) */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .archive-group-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #5c665b;
            padding: 2px 0 2px 8px;
            border-left: 3px solid var(--accent); 
            margin-top: 12px;
            margin-bottom: 6px;
            display: inline-block;
        }

        .archive-item-bullet {
            font-size: 0.85rem;
            color: var(--text-main);
            padding: 6px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #fafbfa;
        }

        .archive-item-bullet:last-child {
            border-bottom: none;
        }

        .archive-item-left {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            flex: 1;
        }

        .archive-item-text-completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .archive-item-checked {
            color: var(--accent);
            font-weight: bold;
            flex-shrink: 0;
        }

        .archive-item-unchecked {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .archive-item-tags {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .archive-item-tag {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        /* 自訂彈窗與提示樣式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            animation: modalFadeIn 0.25s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-card h3 {
            font-size: 1.15rem;

            z-index: 2000;
            pointer-events: none;

        /* 提示空白狀態 */

</head>

    <script>
        // --------------------------
        // 狀態初始化與 LocalStorage
        // --------------------------
        const defaultState = {
            items: [
                { id: 1, text: '護照與簽證', completed: false, location: '隨身包包', category: '貴重證件' },
                { id: 2, text: '換洗衣物', completed: false, location: '大行李箱', category: '衣物鞋包' },
                { id: 3, text: '行動電源與快充線', completed: true, location: '後背包', category: '電子配件' },
                { id: 4, text: '牙刷盥洗組', completed: false, location: '大行李箱', category: '盥洗用品' }
            ],
            locations: ['大行李箱', '後背包', '隨身包包'],
            categories: ['貴重證件', '衣物鞋包', '電子配件', '盥洗用品', '其他備用'],
            archives: [], 
            selectedFont: 'system', 
            customFontRecords: [] 
        };

        // 支援 Traditional Chinese 常見字體降級策略
        const FONT_MAP = {
            system: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
            serif: 'Georgia, Cambria, "Times New Roman", Times, "Noto Serif TC", "PMingLiU", "MingLiU", serif',
            jhenghei: '"Microsoft JhengHei", "Apple LiGothic Medium", sans-serif',
            kaiti: '"DFKai-SB", "BiauKai", "Noto Serif CJK TC", serif',
            monospace: 'Consolas, Monaco, "Courier New", Courier, monospace',
            rounded: '"Comic Sans MS", "華康圓體", "Yu Gothic", sans-serif'
        };

        let appState = defaultState;
        try {
            const savedState = localStorage.getItem('packing_app_state');
            if (savedState) {
                appState = JSON.parse(savedState);
                if (!appState.archives) appState.archives = [];
                if (!appState.selectedFont) appState.selectedFont = 'system';
                if (!appState.customFontRecords) appState.customFontRecords = [];
            }
        } catch (e) {
            console.warn("LocalStorage 存取失敗：", e);
        }

        // 當前選擇項，用於內嵌選擇器 (預設保留前次輸入，預設載入最後一筆或第一筆)
        let selectedLocation = appState.locations[0] || '';
        let selectedCategory = appState.categories[0] || '';

        // ----------------------------------------------------
        // IndexedDB 技術：高容量永久字型儲存
        // ----------------------------------------------------
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('PackingAppDB', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('fonts')) {
                        db.createObjectStore('fonts', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function saveFontToDB(name, blob) {
            return openDB().then(db => {
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction('fonts', 'readwrite');
                    const store = transaction.objectStore('fonts');
                    store.put({ id: name, data: blob });
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });
            });
        }

        function loadFontsFromDB() {
            return openDB().then(db => {
                return new Promise((resolve) => {
                    const transaction = db.transaction('fonts', 'readonly');
                    const store = transaction.objectStore('fonts');
                    const getRequest = store.getAll();
                    getRequest.onsuccess = () => resolve(getRequest.result || []);
                    getRequest.onerror = () => resolve([]);
                });
            });
        }

        function deleteFontFromDB(name) {
            return openDB().then(db => {
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction('fonts', 'readwrite');
                    const store = transaction.objectStore('fonts');
                    const delRequest = store.delete(name);
                    delRequest.onsuccess = () => resolve();
                    delRequest.onerror = () => reject(delRequest.error);
                });
            });
        }

        // 綁定 DOM 元素
        const pagesContainer = document.getElementById('pages-container');
        const groupedItemsContainer = document.getElementById('grouped-items');
        const itemInput = document.getElementById('item-input');
        const addBtn = document.getElementById('add-btn');
        const statsText = document.getElementById('stats-text');
        const emptyState = document.getElementById('empty-state');
        const navItems = document.querySelectorAll('.nav-item');
        const fontFamilySelect = document.getElementById('font-family-select');

        let currentPageIndex = 0;

        // --------------------------
        // 語意聯想標籤色彩系統 (莫蘭迪色系調色盤)
        // --------------------------
        function getTagStyle(text) {
            if (!text) return '';
            const lowerText = text.toLowerCase();
            
            // 1. 重要 / 貴重 / 必備 / 證件 (暖紅、珊瑚橘)
            if (lowerText.includes('重要') || lowerText.includes('貴重') || lowerText.includes('緊急') || lowerText.includes('證件') || lowerText.includes('必備') || lowerText.includes('護照') || lowerText.includes('錢') || lowerText.includes('卡')) {
                return `background-color: #fcebeb; border: 1px solid #cca4a4; color: #a35c5c;`;
            }
            // 2. 衣物 / 鞋帽 / 配件 (溫和寧靜藍)
            if (lowerText.includes('衣') || lowerText.includes('鞋') || lowerText.includes('襪') || lowerText.includes('服') || lowerText.includes('帽') || lowerText.includes('穿') || lowerText.includes('褲') || lowerText.includes('裝')) {
                return `background-color: #eaf1f7; border: 1px solid #a4b9cc; color: #5c7ca3;`;
            }
            // 3. 電子 / 數位 / 3C / 充電設備 (薰衣草柔紫)
            if (lowerText.includes('電') || lowerText.includes('數位') || lowerText.includes('3c') || lowerText.includes('線') || lowerText.includes('機') || lowerText.includes('相機') || lowerText.includes('耳機') || lowerText.includes('充')) {
                return `background-color: #f1eaf7; border: 1px solid #b7a4cc; color: #755ca3;`;
            }
            // 4. 盥洗 / 保養 / 衛生 / 醫藥 (薄荷森綠、粉綠)
            if (lowerText.includes('盥洗') || lowerText.includes('保養') || lowerText.includes('牙') || lowerText.includes('藥') || lowerText.includes('衛') || lowerText.includes('洗') || lowerText.includes('梳') || lowerText.includes('化妝')) {
                return `background-color: #eaf7f2; border: 1px solid #a4cca8; color: #5ca385;`;
            }
            // 5. 戶外 / 實用工具 / 雨具 (大地茶褐、橄欖綠)
            if (lowerText.includes('戶外') || lowerText.includes('工具') || lowerText.includes('雨') || lowerText.includes('傘') || lowerText.includes('水瓶') || lowerText.includes('指南')) {
                return `background-color: #edf2eb; border: 1px solid #b9c7b5; color: #62755d;`;
            }
            // 6. 其他 / 雜物 / 備用 (極簡中性灰)
            if (lowerText.includes('其他') || lowerText.includes('備用') || lowerText.includes('雜') || lowerText.includes('未分類')) {
                return `background-color: #f2f2f2; border: 1px solid #d4d4d4; color: #737373;`;
            }

            // 備用：若無法語意識別則採原有動態色彩 Hash 算法
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                hash = text.charCodeAt(i) + ((hash << 5) - hash);
            }
            
            const h = Math.abs(hash) % 360;
            const s = 14 + (Math.abs(hash >> 1) % 12);
            const l = 91 + (Math.abs(hash >> 2) % 4);
            
            const bgColor = `hsl(${h}, ${s}%, ${l}%)`;
            const borderColor = `hsl(${h}, ${s}%, ${l - 12}%)`;
            const textColor = `hsl(${h}, ${s + 18}%, ${l - 58}%)`;

            return `background-color: ${bgColor}; border: 1px solid ${borderColor}; color: ${textColor};`;
        }

        // --------------------------
        // 儲存與同步
        // --------------------------
        function saveState() {
            try {
                localStorage.setItem('packing_app_state', JSON.stringify(appState));
            } catch (e) {
                console.warn("無法將資料儲存至 LocalStorage：", e);
            }
        }

        // --------------------------
        // 提示訊息 (Toast)
        // --------------------------
        function showToast(message) {
            const toast = document.getElementById('toast-message');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);

        // --------------------------
        // 字型更新與動態載入機制
        // --------------------------
        function changeAppFont(fontKey) {
            let fontValue = FONT_MAP[fontKey];
            if (!fontValue) {
                fontValue = `"${fontKey}", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
            }
            document.documentElement.style.setProperty('--font-family', fontValue);
            appState.selectedFont = fontKey;
            saveState();
        }

        // --------------------------
        // 輔劇防禦防護機制
        // --------------------------
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function addFontOptionToSelect(fontId, fontName) {
            if (!fontFamilySelect.querySelector(`option[value="${fontId}"]`)) {
                const opt = document.createElement('option');
                opt.value = fontId;
                opt.innerText = fontName;
                fontFamilySelect.appendChild(opt);
            }
        }

        function handleFontUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const MAX_SIZE = 12 * 1024 * 1024;
            if (file.size > MAX_SIZE) {
                showToast("字型檔案過大（請小於 12MB），建議改用 WOFF2 高壓縮格式！");
                event.target.value = '';
                return;
            }

            const uploadBtn = document.querySelector('button[onclick*="font-file-input"]');
            const originalBtnText = uploadBtn.innerText;
            uploadBtn.innerText = "字型解析編譯中...";
            uploadBtn.disabled = true;

            if (file.size > 5 * 1024 * 1024) {
                showToast("大字型解析中，手機效能不同可能耗時數秒，請稍候...");
            }

            let rawName = file.name.substring(0, file.name.lastIndexOf('.'));
            let fontName = 'CustomFont_' + rawName.replace(/[^a-zA-Z0-9]/g, '_') + '_' + Date.now();

            saveFontToDB(fontName, file).then(() => {
                const url = URL.createObjectURL(file);
                const fontFace = new FontFace(fontName, `url(${url})`);

                return fontFace.load().then(loadedFace => {
                    document.fonts.add(loadedFace);
                    URL.revokeObjectURL(url);

                    addFontOptionToSelect(fontName, rawName + ' (自訂)');

                    if (!appState.customFontRecords) appState.customFontRecords = [];
                    if (!appState.customFontRecords.some(r => r.id === fontName)) {
                        appState.customFontRecords.push({ id: fontName, name: rawName });
                        saveState();
                    }

                    fontFamilySelect.value = fontName;
                    changeAppFont(fontName);

                    renderUploadedFontsList();
                    showToast(`成功導入字型：${rawName}`);
                }).catch(err => {
                    URL.revokeObjectURL(url);
                    throw err;
                });
            }).catch(err => {
                console.error("導入自訂字型出錯: ", err);
                showToast("字型導入失敗，建議更換 woff/woff2 格式");
            }).finally(() => {
                uploadBtn.innerText = originalBtnText;
                uploadBtn.disabled = false;
                event.target.value = '';
            });
        }

        function renderUploadedFontsList() {
            const container = document.getElementById('uploaded-fonts-list');
            container.innerHTML = '';
            const records = appState.customFontRecords || [];

            if (records.length === 0) {
                container.innerHTML = `<p style="font-size: 0.75rem; color: var(--text-muted); font-style: italic; text-align: center; margin-top: 4px;">尚未導入任何外部裝置字型</p>`;
                return;
            }

            records.forEach(rec => {
                const row = document.createElement('div');
                row.style.cssText = 'display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color);';
                row.innerHTML = `
                    <span style="font-size: 0.8rem; font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 260px;">${escapeHtml(rec.name)}</span>
                    <button onclick="deleteCustomFont('${rec.id}')" style="background:none; border:none; color:var(--danger); font-size:0.85rem; cursor:pointer; padding:2px 6px;" aria-label="刪除此字體">✕</button>
                `;
                container.appendChild(row);
            });
        }

        function deleteCustomFont(fontId) {
            deleteFontFromDB(fontId).then(() => {
                const opt = fontFamilySelect.querySelector(`option[value="${fontId}"]`);
                if (opt) opt.remove();

                appState.customFontRecords = (appState.customFontRecords || []).filter(r => r.id !== fontId);

                if (appState.selectedFont === fontId) {
                    fontFamilySelect.value = 'system';
                    changeAppFont('system');
                }

                saveState();
                renderUploadedFontsList();
                showToast("自訂字型已成功刪除");
            }).catch(err => {
                console.error("刪除自訂字型失敗: ", err);
                showToast("刪除自訂字型失敗");
            });
        }

        // --------------------------
        // 分頁與滑動切換邏輯
        // --------------------------
        function switchPage(index) {
            currentPageIndex = index;
            pagesContainer.style.transform = `translateX(-${index * 33.333}%)`;
            
            navItems.forEach((item, idx) => {
                if (idx === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            // 當切換頁面時自動收合選擇器
            toggleInlineSelect('location', false);
            toggleInlineSelect('category', false);
        }

        // ----------------------------------------------------
        // 【優化】Touch 觸控滑動：加入 X/Y 位移比率判定與更高閾值，防止上下滾動誤觸分頁
        // ----------------------------------------------------
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        document.getElementById('pages-container').addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.getElementById('pages-container').addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistanceX = touchStartX - touchEndX;
            const swipeDistanceY = touchStartY - touchEndY;
            
            // 提高水平滑動距離閾值（原先為 60px），現在設定 100px 確保是有意滑動
            const swipeThresholdX = 100;
            // 垂直滾動容忍度，若使用者正在大幅度垂直滾動則忽視本次滑動
            const swipeThresholdY = 60; 

            // 1. 確保水平移動距離達到閾值，且垂直移動在合理範圍內
            if (Math.abs(swipeDistanceX) > swipeThresholdX && Math.abs(swipeDistanceY) < swipeThresholdY) {
                // 2. 水平滑動的距離必須「大幅大於」垂直滑動距離（2倍以上），才判定為有意圖的左右翻頁
                if (Math.abs(swipeDistanceX) > Math.abs(swipeDistanceY) * 2) {
                    if (swipeDistanceX > 0 && currentPageIndex === 0) {
                        switchPage(1);
                    } else if (swipeDistanceX < 0 && currentPageIndex === 1) {
                        switchPage(0);
                    }
                }
            }
        }

        // --------------------------
        // 渲染自訂無額外視窗選擇器列表
        // --------------------------
        function populateCustomSelects() {
            // 確認已有預設值，若無則指派預設值
            if (!selectedLocation && appState.locations.length > 0) {
                selectedLocation = appState.locations[0];
            }
            if (!selectedCategory && appState.categories.length > 0) {
                selectedCategory = appState.categories[0];
            }

            // 1. 渲染 放置位置 內嵌選項
            const locOptionsContainer = document.getElementById('location-options');
            locOptionsContainer.innerHTML = '';
            appState.locations.forEach(loc => {
                const div = document.createElement('div');
                div.className = `inline-option-item ${selectedLocation === loc ? 'selected' : ''}`;
                div.innerHTML = `
                    <span>${escapeHtml(loc)}</span>
                    ${selectedLocation === loc ? '<span style="font-weight:bold;">✓</span>' : ''}
                `;
                div.onclick = (e) => {
                    e.stopPropagation();
                    selectInlineOption('location', loc);
                };
                locOptionsContainer.appendChild(div);
            });
            // 新增放置位置觸發項
            const locNewDiv = document.createElement('div');
            locNewDiv.className = `inline-option-item inline-option-item-new ${selectedLocation === '__new__' ? 'selected' : ''}`;
            locNewDiv.innerHTML = `<span>＋ 新增放置位置...</span>`;
            locNewDiv.onclick = (e) => {
                e.stopPropagation();
                selectInlineOption('location', '__new__');
            };
            locOptionsContainer.appendChild(locNewDiv);

            // 2. 渲染 物品分類 內嵌選項
            const catOptionsContainer = document.getElementById('category-options');
            catOptionsContainer.innerHTML = '';
            appState.categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = `inline-option-item ${selectedCategory === cat ? 'selected' : ''}`;
                div.innerHTML = `
                    <span>${escapeHtml(cat)}</span>
                    ${selectedCategory === cat ? '<span style="font-weight:bold;">✓</span>' : ''}
                `;
                div.onclick = (e) => {
                    e.stopPropagation();
                    selectInlineOption('category', cat);
                };
                catOptionsContainer.appendChild(div);
            });
            // 新增物品分類觸發項
            const catNewDiv = document.createElement('div');
            catNewDiv.className = `inline-option-item inline-option-item-new ${selectedCategory === '__new__' ? 'selected' : ''}`;
            catNewDiv.innerHTML = `<span>＋ 新增物品分類...</span>`;
            catNewDiv.onclick = (e) => {
                e.stopPropagation();
                selectInlineOption('category', '__new__');
            };
            catOptionsContainer.appendChild(catNewDiv);

            // 更新預覽顯示條文字
            document.getElementById('location-trigger-text').innerText = selectedLocation === '__new__' ? '＋ 新增放置位置...' : selectedLocation;
            document.getElementById('category-trigger-text').innerText = selectedCategory === '__new__' ? '＋ 新增物品分類...' : selectedCategory;
        }

        // 選擇內嵌選項事件
        function selectInlineOption(type, value) {
            if (type === 'location') {
                selectedLocation = value;
                const customContainer = document.getElementById('location-custom');
                if (value === '__new__') {
                    customContainer.classList.add('show');
                    setTimeout(() => {
                        document.getElementById('location-custom-input').focus();
                    }, 150);
                } else {
                    customContainer.classList.remove('show');
                }
                toggleInlineSelect('location', false);
            } else if (type === 'category') {
                selectedCategory = value;
                const customContainer = document.getElementById('category-custom');
                if (value === '__new__') {
                    customContainer.classList.add('show');
                    setTimeout(() => {
                        document.getElementById('category-custom-input').focus();
                    }, 150);
                } else {
                    customContainer.classList.remove('show');
                }
                toggleInlineSelect('category', false);
            }
            populateCustomSelects();
        }

        // 切換內嵌選擇器收展狀態
        function toggleInlineSelect(type, forceState) {
            const selectContainer = document.getElementById(`${type}-select-container`);
            const menu = document.getElementById(`${type}-menu`);
            
            let shouldShow;
            if (typeof forceState === 'boolean') {
                shouldShow = forceState;
            } else {
                shouldShow = !menu.classList.contains('show');
            }

            if (shouldShow) {
                // 關閉另一個展開中的選擇器，保持畫面乾淨
                const otherType = type === 'location' ? 'category' : 'location';
                toggleInlineSelect(otherType, false);

                selectContainer.classList.add('open');
                selectContainer.classList.add('active');
                menu.classList.add('show');
            } else {
                selectContainer.classList.remove('open');
                selectContainer.classList.remove('active');
                menu.classList.remove('show');
            }
        }

        // --------------------------
        // 管理選項與直接新增、刪除功能
        // --------------------------
        function toggleManager(type) {
            const manager = document.getElementById(`${type}-manager`);
            const isShowing = manager.classList.toggle('show');
            if (isShowing) {
                renderManager(type);
            }
        }

        function renderManager(type) {
            const container = document.getElementById(`${type}-manager`);
            container.innerHTML = '';
            
            // 建立快速新增欄位
            const addRow = document.createElement('div');
            addRow.className = 'manager-add-row';
            
            const addInput = document.createElement('input');
            addInput.type = 'text';
            addInput.className = 'manager-add-input';
            addInput.placeholder = type === 'location' ? '新增放置位置...' : '新增物品分類...';
            addInput.autocomplete = 'off';
            
            const addBtn = document.createElement('button');
            addBtn.className = 'manager-add-btn';
            addBtn.innerText = '新增';
            
            const handleDirectAdd = () => {
                const val = addInput.value.trim();
                if (val !== '') {
                    addOptionDirect(type, val);
                    addInput.value = '';
                }
            };
            
            addBtn.addEventListener('click', handleDirectAdd);
            addInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleDirectAdd();
                }
            });
            
            addRow.appendChild(addInput);
            addRow.appendChild(addBtn);
            container.appendChild(addRow);
            
            // 建立獨立滾動的現有選項清單
            const listDiv = document.createElement('div');
            listDiv.className = 'manager-list';
            
            const list = type === 'location' ? appState.locations : appState.categories;
            const deleteFnName = type === 'location' ? 'deleteLocationOption' : 'deleteCategoryOption';

            if (list.length === 0) {
                listDiv.innerHTML = `<div style="font-size:0.8rem; color:var(--text-muted); text-align:center; padding:8px;">尚無選項</div>`;
            } else {
                list.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'manager-item';
                    row.innerHTML = `
                        <span>${escapeHtml(item)}</span>
                        <button class="manager-del-btn" onclick="${deleteFnName}('${escapeHtml(item)}')">✕</button>
                    `;
                    listDiv.appendChild(row);
                });
            }
            container.appendChild(listDiv);
        }

        function addOptionDirect(type, value) {
            const trimmedValue = value.trim();
            if (trimmedValue === '') return;
            
            if (type === 'location') {
                if (!appState.locations.includes(trimmedValue)) {
                    appState.locations.push(trimmedValue);
                    showToast(`已新增位置：${trimmedValue}`);
                } else {
                    showToast('該放置位置已存在！');
                    return;
                }
            } else if (type === 'category') {
                if (!appState.categories.includes(trimmedValue)) {
                    appState.categories.push(trimmedValue);
                    showToast(`已新增分類：${trimmedValue}`);
                } else {
                    showToast('該物品分類已存在！');
                    return;
                }
            }
            
            saveState();
            populateCustomSelects();
            renderManager(type); 
        }

        function deleteLocationOption(loc) {
            appState.locations = appState.locations.filter(l => l !== loc);
            // 若目前選取的剛好被刪除，則重設為預設項
            if (selectedLocation === loc) {
                selectedLocation = appState.locations[0] || '';
            }
            saveState();
            populateCustomSelects();
            renderManager('location');
        }

        function deleteCategoryOption(cat) {
            appState.categories = appState.categories.filter(c => c !== cat);
            // 若目前選取的剛好被刪除，則重設為預設項
            if (selectedCategory === cat) {
                selectedCategory = appState.categories[0] || '';
            }
            saveState();
            populateCustomSelects();
            renderManager('category');
        }

        // --------------------------
        // 渲染主清單
        // --------------------------
        function renderGroupedList() {
            groupedItemsContainer.innerHTML = '';

            if (appState.items.length === 0) {
                emptyState.style.display = 'flex';
                updateStats();
                return;
            }
            emptyState.style.display = 'none';

            const activeLocations = [...new Set(appState.items.map(item => item.location || '其他位置'))].sort((a, b) => 
                a.localeCompare(b, 'zh-Hant')
            );

            activeLocations.forEach(loc => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'location-group';

                const headerDiv = document.createElement('div');
                headerDiv.className = 'group-header';
                headerDiv.innerHTML = `${escapeHtml(loc)}`;
                groupDiv.appendChild(headerDiv);

                const itemList = document.createElement('ul');
                itemList.className = 'item-list';

                const groupItems = appState.items.filter(item => (item.location || '其他位置') === loc);
                const sortedGroupItems = [...groupItems].sort((a, b) => {
                    if (a.completed !== b.completed) {
                        return a.completed - b.completed;
                    }
                    const catCompare = (a.category || '').localeCompare(b.category || '', 'zh-Hant');
                    if (catCompare !== 0) return catCompare;
                    return (a.text || '').localeCompare(b.text || '', 'zh-Hant');
                });

                sortedGroupItems.forEach(item => {
                    const li = document.createElement('li');
                    li.className = `item-node ${item.completed ? 'completed' : ''}`;

                    const catTagStyle = getTagStyle(item.category);

                    li.innerHTML = `
                        <div class="item-left">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleComplete(${item.id})">
                                <span class="checkmark"></span>
                            </label>
                            <div class="item-content">
                                <div class="item-text-row">
                                    <input type="text" class="item-text" value="${escapeHtml(item.text)}" onchange="editItem(${item.id}, this.value)">
                                </div>
                                <div class="item-tags">
                                    <span class="tag" style="${catTagStyle}">${escapeHtml(item.category)}</span>
                                </div>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">✕</button>
                    `;
                    itemList.appendChild(li);
                });

                groupDiv.appendChild(itemList);
                groupedItemsContainer.appendChild(groupDiv);
            });

            updateStats();
        }

        // --------------------------
        // 一鍵封存功能
        // --------------------------
        function openArchiveModal() {
            if (appState.items.length === 0) {
                showToast('當前清單無任何物品，無法進行封存！');
                return;
            }
            const today = new Date();
            const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            document.getElementById('archive-name-input').value = `${dateStr} 旅行清單`;
            document.getElementById('archive-modal').classList.add('show');
        }

        function closeArchiveModal() {
            document.getElementById('archive-modal').classList.remove('show');
        }

        function submitArchive() {
            const nameInput = document.getElementById('archive-name-input');
            const archiveName = nameInput.value.trim() || '未命名旅行清單';

            const today = new Date();
            const formattedDate = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

            const newArchive = {
                id: Date.now(),
                name: archiveName,
                date: formattedDate,
                items: JSON.parse(JSON.stringify(appState.items))
            };

            appState.archives.unshift(newArchive);
            appState.items = [];

            saveState();
            closeArchiveModal();
            renderGroupedList();
            renderArchiveRecords();

            switchPage(2);
            showToast('已成功一鍵封存！');
        }

        // --------------------------
        // 歷史封存紀錄渲染
        // --------------------------
        function renderArchiveRecords() {
            const container = document.getElementById('archive-list');
            const emptyState = document.getElementById('archive-empty-state');
            container.innerHTML = '';

            const archives = appState.archives || [];
            if (archives.length === 0) {
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';

            archives.forEach(arc => {
                const card = document.createElement('div');
                card.className = 'archive-card';

                const total = arc.items.length;
                const completedCount = arc.items.filter(i => i.completed).length;

                const arcLocations = [...new Set(arc.items.map(item => item.location || '其他位置'))].sort((a, b) => 
                    a.localeCompare(b, 'zh-Hant')
                );

                let itemsListHtml = '';
                arcLocations.forEach(loc => {
                    itemsListHtml += `
                        <div class="archive-group-title">${escapeHtml(loc)}</div>
                    `;

                    const groupItems = arc.items.filter(item => (item.location || '其他位置') === loc);
                    const sortedGroupItems = [...groupItems].sort((a, b) => {
                        if (a.completed !== b.completed) {
                            return a.completed - b.completed;
                        }
                        const catCompare = (a.category || '').localeCompare(b.category || '', 'zh-Hant');
                        if (catCompare !== 0) return catCompare;
                        return (a.text || '').localeCompare(b.text || '', 'zh-Hant');
                    });

                    sortedGroupItems.forEach(item => {
                        const catStyle = getTagStyle(item.category);
                        itemsListHtml += `
                            <li class="archive-item-bullet">
                                <div class="archive-item-left">
                                    <span class="${item.completed ? 'archive-item-checked' : 'archive-item-unchecked'}">
                                        ${item.completed ? '✓' : '○'}
                                    </span>
                                    <span class="${item.completed ? 'archive-item-text-completed' : ''}">${escapeHtml(item.text)}</span>
                                </div>
                                <div class="archive-item-tags">
                                    <span class="archive-item-tag" style="${catStyle}">${escapeHtml(item.category)}</span>
                                </div>
                            </li>
                        `;
                    });
                });

                card.innerHTML = `
                    <div class="archive-card-header">
                        <div class="archive-info">
                            <span class="archive-name">${escapeHtml(arc.name)}</span>
                            <span class="archive-date">${arc.date} • 已打包 ${completedCount}/${total} 項</span>
                        </div>
                        <div class="archive-actions">
                            <button class="archive-action-btn archive-btn-restore" onclick="restoreArchive(${arc.id})">還原</button>
                            <button class="archive-action-btn archive-btn-delete" onclick="deleteArchive(${arc.id})">刪除</button>
                        </div>
                    </div>
                    <button class="archive-details-toggle" onclick="toggleArchiveDetails(this)">
                        <span>展開 (共 ${total} 項)</span> ▾
                    </button>
                    <ul class="archive-items-list">
                        ${itemsListHtml}
                    </ul>
                `;
                container.appendChild(card);
            });
        }

        function toggleArchiveDetails(btn) {
            const list = btn.nextElementSibling;
            const isShowing = list.classList.toggle('show');
            const bullets = list.querySelectorAll('.archive-item-bullet');
            const itemsCount = bullets.length;
            btn.innerHTML = `<span>${isShowing ? '收合' : `展開 (共 ${itemsCount} 項)`}</span> ${isShowing ? '▴' : '▾'}`;
        }

        function deleteArchive(id) {
            appState.archives = appState.archives.filter(arc => arc.id !== id);
            saveState();
            renderArchiveRecords();
            showToast('封存紀錄已刪除');
        }

        function restoreArchive(id) {
            const arc = appState.archives.find(a => a.id === id);
            if (!arc) return;

            const restoredItems = JSON.parse(JSON.stringify(arc.items));
            appState.items = [...appState.items, ...restoredItems];

            restoredItems.forEach(item => {
                if (item.location && !appState.locations.includes(item.location)) {
                    appState.locations.push(item.location);
                }
                if (item.category && !appState.categories.includes(item.category)) {
                    appState.categories.push(item.category);
                }
            });

            saveState();
            populateCustomSelects();
            renderGroupedList();

            switchPage(0);
            showToast(`已成功還原封存旅行「${arc.name}」的行李項目！`);
        }

        // --------------------------
        // 工具更新與資料處理
        // --------------------------
        function updateStats() {
            const total = appState.items.length;
            const completedCount = appState.items.filter(item => item.completed).length;
            statsText.innerText = `${completedCount} / ${total} 已打包`;
        }

        // --------------------------
        // 清單狀態操作與優化
        // --------------------------
        function toggleComplete(id) {
            appState.items = appState.items.map(item => {
                if (item.id === id) {
                    return { ...item, completed: !item.completed };
                }
                return item;
            });
            saveState();
            renderGroupedList();
        }

        function editItem(id, newText) {
            appState.items = appState.items.map(item => {
                if (item.id === id) {
                    return { ...item, text: newText.trim() };
                }
                return item;
            });
            saveState();
            renderGroupedList();
        }

        function deleteItem(id) {
            appState.items = appState.items.filter(item => item.id !== id);
            saveState();
            renderGroupedList();
        }

        // --------------------------
        // 新增行李處理邏輯 (停留在原地並顯示彈跳確認窗)
        // --------------------------
        function addItem() {
            const text = itemInput.value.trim();
            if (text === '') return;

            let finalLocation = selectedLocation;
            let finalCategory = selectedCategory;

            // 處理「新增放置位置」自訂值
            if (finalLocation === '__new__') {
                const customLocInput = document.getElementById('location-custom-input');
                const customLocValue = customLocInput.value.trim();
                if (customLocValue !== '') {
                    finalLocation = customLocValue;
                    if (!appState.locations.includes(finalLocation)) {
                        appState.locations.push(finalLocation);
                    }
                    // 保留此新增值作為下次預設
                    selectedLocation = finalLocation;
                } else {
                    finalLocation = '未分類位置';
                    selectedLocation = finalLocation;
                }
            }

            // 處理「新增物品分類」自訂值
            if (finalCategory === '__new__') {
                const customCatInput = document.getElementById('category-custom-input');
                const customCatValue = customCatInput.value.trim();
                if (customCatValue !== '') {
                    finalCategory = customCatValue;
                    if (!appState.categories.includes(finalCategory)) {
                        appState.categories.push(finalCategory);
                    }
                    // 保留此新增值作為下次預設
                    selectedCategory = finalCategory;
                } else {
                    finalCategory = '其他備用';
                    selectedCategory = finalCategory;
                }
            }

            const newItem = {
                id: Date.now(),
                text: text,
                completed: false,
                location: finalLocation,
                category: finalCategory
            };

            appState.items.push(newItem);
            
            // 僅重置物品名稱輸入欄與隱藏自訂輸入槽，保留放置位置及分類選擇以利下次直接利用
            itemInput.value = '';
            document.getElementById('location-custom-input').value = '';
            document.getElementById('category-custom-input').value = '';
            document.getElementById('location-custom').classList.remove('show');
            document.getElementById('category-custom').classList.remove('show');

            saveState();
            populateCustomSelects(); // 重繪自訂選項條
            renderGroupedList(); // 背後同步更新清單

            // 彈出精美自訂彈跳確認視窗
            openAddedModal(text);
        }

        let addedModalTimeout = null;

        // 打開新增成功彈跳視窗
        function openAddedModal(itemName) {
            document.getElementById('added-modal-item-name').innerText = `「${itemName}」已成功歸入「${selectedLocation}」的「${selectedCategory}」中！`;
            const modal = document.getElementById('added-modal');
            modal.classList.add('show');
            
            // 1.8 秒後自動隱藏，維持極佳的流暢度和盲打體驗
            if (addedModalTimeout) clearTimeout(addedModalTimeout);
            addedModalTimeout = setTimeout(() => {
                closeAddedModal();
            }, 1800);
        }

        // 關閉新增成功彈跳視窗
        function closeAddedModal() {
            if (addedModalTimeout) clearTimeout(addedModalTimeout);
            document.getElementById('added-modal').classList.remove('show');
        }

        // --------------------------
        // 事件監聽與初始執行
        // --------------------------
        addBtn.addEventListener('click', addItem);
        itemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addItem();
            }
        });

        // 點選空白處自動收合內嵌下拉選單
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.custom-inline-select') && !e.target.closest('.manage-btn') && !e.target.closest('.manager-container')) {
                toggleInlineSelect('location', false);
                toggleInlineSelect('category', false);
            }
        });

        populateCustomSelects();
        renderGroupedList();
        renderArchiveRecords();

        loadFontsFromDB().then(savedFonts => {
            savedFonts.forEach(f => {
                const url = URL.createObjectURL(f.data);
                const fontFace = new FontFace(f.id, `url(${url})`);
                
                fontFace.load().then(loadedFace => {
                    document.fonts.add(loadedFace);
                    URL.revokeObjectURL(url);

                    const rec = (appState.customFontRecords || []).find(r => r.id === f.id);
                    const displayName = rec ? rec.name : '未命名自訂字型';
                    addFontOptionToSelect(f.id, displayName + ' (自訂)');

                    if (appState.selectedFont === f.id) {
                        fontFamilySelect.value = f.id;
                        changeAppFont(f.id);
                    }
                }).catch(err => {
                    console.warn("啟動載入自訂字體出錯:", err);
                    URL.revokeObjectURL(url);
                });
            });

            if (FONT_MAP[appState.selectedFont] || appState.selectedFont === 'system') {
                fontFamilySelect.value = appState.selectedFont;
                changeAppFont(appState.selectedFont);
            }

            renderUploadedFontsList();
        });
    </script>
</body>
</html>
